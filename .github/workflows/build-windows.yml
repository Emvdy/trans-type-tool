name: Build Windows exes

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python syntax check
        shell: cmd
        run: python -m py_compile trans_type.py

      - name: Python dry run
        shell: cmd
        run: python trans_type.py --dry-run --ascii-only

      - name: Build native WinAPI exe
        shell: cmd
        run: build.bat

      - name: Build C++ wrapper exe
        shell: cmd
        run: build_cpp.bat

      - name: Build Python exe
        shell: cmd
        run: build_python.bat

      - name: Verify generated exes
        shell: pwsh
        run: |
          .\trans_type.exe --dry-run --ascii-only
          .\trans_type_cpp.exe --dry-run --ascii-only
          .\trans_type_py.exe --dry-run --ascii-only

      - name: Record artifact details
        shell: pwsh
        run: |
          Get-Item trans_type.exe, trans_type_cpp.exe, trans_type_py.exe |
            Select-Object Name, Length |
            Format-Table -AutoSize |
            Out-String |
            Tee-Object -FilePath artifact-details.txt

          Get-FileHash trans_type.exe, trans_type_cpp.exe, trans_type_py.exe -Algorithm SHA256 |
            Format-Table -AutoSize |
            Out-String |
            Tee-Object -FilePath artifact-sha256.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trans_type-windows
          path: |
            trans_type.exe
            trans_type_cpp.exe
            trans_type_py.exe
            artifact-details.txt
            artifact-sha256.txt
            README.md
            trans.txt
            trans_type.c
            trans_type.cpp
            trans_type.py
            build.bat
            build_cpp.bat
            build_python.bat
            build_all.bat
            requirements-build.txt
            MAC_BUILD.md
            GITHUB_BUILD.md
