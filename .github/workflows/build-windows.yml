name: Build Windows executables and validate Windows 10

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      validate_windows_10:
        description: Run compatibility tests on a self-hosted Windows 10 x64 runner
        required: true
        default: true
        type: boolean

permissions:
  actions: read
  contents: read

jobs:
  build:
    name: Build Windows ${{ matrix.architecture }} executable
    runs-on: windows-2022
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: x86
            msvc_arch: x86
            pe_machine: "014c"
            artifact_name: qr-transfer-windows-x86
          - architecture: x64
            msvc_arch: x64
            pe_machine: "8664"
            artifact_name: qr-transfer-windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64

      - name: Python syntax check
        shell: cmd
        run: |
          python -m py_compile trans_type.py
          python -m unittest discover -s tests -v

      - name: Python dry run
        shell: cmd
        run: |
          python trans_type.py --dry-run --ascii-only
          python trans_type.py --mode cmd-hex --dry-run --hex-chunk-bytes 240
          python trans_type.py --mode zip-hex --dry-run --hex-chunk-bytes 240

      - name: Build native WinAPI exe
        shell: cmd
        run: build.bat

      - name: Verify generated exe
        shell: cmd
        run: |
          trans_type.exe --dry-run --ascii-only
          trans_type.exe --mode cmd-hex --dry-run --hex-chunk-bytes 240
          trans_type.exe --mode zip-hex --dry-run --hex-chunk-bytes 240

      - name: Verify PE architecture
        shell: powershell
        env:
          EXPECTED_ARCHITECTURE: ${{ matrix.architecture }}
          EXPECTED_PE_MACHINE: ${{ matrix.pe_machine }}
        run: |
          $bytes = [System.IO.File]::ReadAllBytes((Resolve-Path 'trans_type.exe'))
          if ($bytes.Length -lt 64) {
            throw 'trans_type.exe is too short to contain a valid PE header.'
          }

          $peOffset = [BitConverter]::ToInt32($bytes, 0x3c)
          if ($peOffset -lt 0 -or $peOffset + 6 -gt $bytes.Length) {
            throw 'trans_type.exe has an invalid PE header offset.'
          }
          if ($bytes[$peOffset] -ne 0x50 -or $bytes[$peOffset + 1] -ne 0x45 -or
              $bytes[$peOffset + 2] -ne 0 -or $bytes[$peOffset + 3] -ne 0) {
            throw 'trans_type.exe has an invalid PE signature.'
          }

          $actual = [BitConverter]::ToUInt16($bytes, $peOffset + 4)
          $expected = [Convert]::ToUInt16($env:EXPECTED_PE_MACHINE, 16)
          if ($actual -ne $expected) {
            throw ('Expected {0} PE machine 0x{1:x4}, got 0x{2:x4}.' -f
              $env:EXPECTED_ARCHITECTURE, $expected, $actual)
          }
          Write-Host ('Verified {0} PE machine 0x{1:x4}.' -f $env:EXPECTED_ARCHITECTURE, $actual)

      - name: Execute emitted protocols with Windows PowerShell 5.1
        shell: cmd
        run: python tests\verify_windows_exes.py --expected-arch ${{ matrix.architecture }} trans_type.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          retention-days: 14
          if-no-files-found: error
          path: trans_type.exe

  validate-windows-10:
    name: Validate on real Windows 10 x64
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.validate_windows_10 && github.ref == 'refs/heads/main' }}
    needs: build
    runs-on: [self-hosted, windows, x64, windows-10]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assert Windows 10 x64 runner and built-ins
        shell: powershell
        run: |
          $os = Get-CimInstance Win32_OperatingSystem
          $build = [int]$os.BuildNumber
          Write-Host "Caption: $($os.Caption)"
          Write-Host "Version: $($os.Version)"
          Write-Host "Build: $build"
          Write-Host "ProductType: $($os.ProductType)"
          Write-Host "64-bit OS: $([Environment]::Is64BitOperatingSystem)"
          Write-Host "Windows PowerShell: $($PSVersionTable.PSVersion)"

          if ($os.ProductType -ne 1 -or $os.Version -notlike '10.0.*' -or $build -lt 10240 -or $build -ge 22000) {
            throw "This job requires Windows 10 client, not Windows Server or Windows 11."
          }
          if (-not [Environment]::Is64BitOperatingSystem) {
            throw "This job requires a 64-bit Windows 10 installation."
          }
          if ($PSVersionTable.PSEdition -ne 'Desktop' -or $PSVersionTable.PSVersion.Major -ne 5) {
            throw "This job requires Windows PowerShell 5.1."
          }
          Get-Command certutil.exe -ErrorAction Stop | Out-Null
          Get-Command Expand-Archive -ErrorAction Stop | Out-Null

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64

      - name: Download Windows artifacts from this run
        uses: actions/download-artifact@v4
        with:
          name: qr-transfer-windows-x64
          path: windows-artifact

      - name: Assert artifact contains one executable
        shell: powershell
        run: |
          $files = @(Get-ChildItem 'windows-artifact' -File -Recurse)
          if ($files.Count -ne 1 -or $files[0].Name -ne 'trans_type.exe') {
            throw 'qr-transfer-windows-x64 must contain only trans_type.exe.'
          }

      - name: Execute compatibility and protocol tests on Windows 10
        shell: cmd
        run: |
          python -m unittest discover -s tests -v
          windows-artifact\trans_type.exe --mode simple --dry-run
          python tests\verify_windows_exes.py --expected-arch x64 windows-artifact\trans_type.exe
