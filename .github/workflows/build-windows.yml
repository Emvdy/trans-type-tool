name: Build Windows exes

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64

      - name: Python syntax check
        shell: cmd
        run: |
          python -m py_compile trans_type.py
          python -m unittest discover -s tests -v

      - name: Python dry run
        shell: cmd
        run: |
          python trans_type.py --dry-run --ascii-only
          python trans_type.py --mode cmd-hex --dry-run --hex-chunk-bytes 240
          python trans_type.py --mode zip-hex --dry-run --hex-chunk-bytes 240

      - name: Build native WinAPI exe
        shell: cmd
        run: build.bat

      - name: Build C++ wrapper exe
        shell: cmd
        run: build_cpp.bat

      - name: Build Python exe
        shell: cmd
        run: build_python.bat

      - name: Verify generated exes
        shell: cmd
        run: |
          trans_type.exe --dry-run --ascii-only
          trans_type.exe --mode cmd-hex --dry-run --hex-chunk-bytes 240
          trans_type.exe --mode zip-hex --dry-run --hex-chunk-bytes 240
          trans_type_cpp.exe --dry-run --ascii-only
          trans_type_cpp.exe --mode cmd-hex --dry-run --hex-chunk-bytes 240
          trans_type_cpp.exe --mode zip-hex --dry-run --hex-chunk-bytes 240
          trans_type_py.exe --dry-run --ascii-only
          trans_type_py.exe --mode cmd-hex --dry-run --hex-chunk-bytes 240
          trans_type_py.exe --mode zip-hex --dry-run --hex-chunk-bytes 240

      - name: Execute emitted protocols with Windows PowerShell 5.1
        shell: cmd
        run: python tests\verify_windows_exes.py trans_type.exe trans_type_cpp.exe trans_type_py.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trans_type-windows
          retention-days: 14
          path: |
            trans_type.exe
            trans_type_cpp.exe
            trans_type_py.exe
            README.md
            trans.txt
            trans_type.c
            trans_type.cpp
            trans_type.py
            build.bat
            build_cpp.bat
            build_python.bat
            build_all.bat
            requirements-build.txt
            MAC_BUILD.md
            GITHUB_BUILD.md
            tests/*.py
